description: >-
  FinOps view of Glide spend. Glide bills a recurring workspace subscription per
  plan tier (Explorer / Maker / Business / Enterprise) plus metered overages -
  $0.02 per Update beyond the plan's included monthly Updates and a per-user
  charge ($5-$6) for users beyond the plan's included seats. The dominant
  variable-cost driver is Updates: data edits and external syncs, including
  those performed through the REST API, consume the allowance. Choosing the
  right tier, batching writes, and trimming unnecessary syncs are the primary
  levers.
notes: >-
  Per-tier prices, included Updates, and seat counts change; verify against the
  Glide pricing page during reconciliation. Annual billing reduces effective
  monthly cost by roughly 20%.
