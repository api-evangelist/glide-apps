meters:
- name: plan_subscription
  description: Recurring per-plan workspace fee (Explorer / Maker / Business / Enterprise), billed monthly or annually.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: updates
  description: Data edits and external syncs counted as Updates; overage billed at $0.02 per Update beyond the plan allowance.
  unit: updates
  aggregation: sum
  dimensions:
  - account
  - app
- name: additional_users
  description: Users beyond the plan's included seats, billed $5 (annual) or $6 (monthly) per user.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - plan
- name: rows_stored
  description: Rows held in Glide Tables / Big Tables, subject to plan data-scale limits.
  unit: rows
  aggregation: max
  dimensions:
  - account
  - table
principles:
- name: Visibility
  description: Track Updates burn per app in the Glide workspace usage view; watch for API-driven syncs that spike Update consumption.
- name: Allocation
  description: Map workspaces / apps to teams and cost centers; attribute Updates and seats to owners.
- name: Optimization
  description: Right-size the plan to included Updates and seats; batch API writes, use stashes for large loads, and prune redundant external syncs to stay under the allowance.
- name: Accountability
  description: Assign an owner per workspace; review monthly Updates and seat overages against the plan allowance and budget.
